<div class="container-fluid contato-page">
  <div class="row">

    <div
      class="col-lg-5 image-container d-none d-lg-block"
    >
      <img
        src="/assets/images/contato/contato.png"
        class="img-fluid"
        alt="Contato"
      />
    </div>

    <div
      class="col-lg-7 chat-container"
    >
      <div class="chat-wrapper">

        <div class="chat-header">
          <div class="chat-avatar">
            🤖
          </div>

          <div>
            <h2>
              SoftSolutions AI
            </h2>

            <span>
              Assistente virtual online
            </span>
          </div>

          <button
            class="clear-chat-btn"
            (click)="clearChat()"
          >
            Limpar
          </button>
        </div>

        <div
          class="chat-body"
          #chatBody
        >
          <div
            *ngFor="let msg of messages"
            class="message-wrapper"
            [ngClass]="{
              'user-wrapper':
                msg.sender === 'user',

              'bot-wrapper':
                msg.sender === 'bot'
            }"
          >
            <div
              class="message"
              [ngClass]="{
                'user-message':
                  msg.sender === 'user',

                'bot-message':
                  msg.sender === 'bot'
              }"
            >
              {{ msg.text }}

              <div
                *ngIf="msg.suggestions?.length"
                class="suggestions"
              >
                <button
                  *ngFor="let suggestion of msg.suggestions"
                  (click)="selectSuggestion(suggestion)"
                >
                  {{ suggestion }}
                </button>
              </div>
            </div>
          </div>

          <div
            *ngIf="loading"
            class="typing"
          >
            <span></span>
            <span></span>
            <span></span>
          </div>
        </div>

        <div class="chat-input">
          <input
            type="text"
            placeholder="Digite sua mensagem..."
            [(ngModel)]="userMessage"
            (keyup.enter)="sendMessage()"
          />

          <button
            (click)="sendMessage()"
          >
            Enviar
          </button>
        </div>

      </div>
    </div>

  </div>
</div>
