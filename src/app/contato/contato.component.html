<div class="container-fluid contato-page">
  <div class="row">

    <!-- ===================================================== -->
    <!-- IMAGE -->
    <!-- ===================================================== -->

    <div
      class="col-lg-5 image-container d-none d-lg-block"
    >
      <img
        src="/assets/images/contato/contato.png"
        class="img-fluid"
        alt="Contato"
      />
    </div>

    <!-- ===================================================== -->
    <!-- CHAT -->
    <!-- ===================================================== -->

    <div
      class="col-lg-7 chat-container"
    >
      <div class="chat-wrapper">

        <!-- ===================================================== -->
        <!-- HEADER -->
        <!-- ===================================================== -->

        <div class="chat-header">

          <div class="chat-avatar">
            🤖
          </div>

          <div>
            <h2>
              SoftSolutions AI
            </h2>

            <span>
              Assistente virtual online
            </span>
          </div>

          <button
            class="clear-chat-btn"
            (click)="clearChat()"
          >
            Limpar
          </button>

        </div>

        <!-- ===================================================== -->
        <!-- BODY -->
        <!-- ===================================================== -->

        <div
          class="chat-body"
          #chatBody
        >

          <div
            *ngFor="let msg of messages"
            class="message-wrapper"
            [ngClass]="{
              'user-wrapper':
                msg.sender === 'user',

              'bot-wrapper':
                msg.sender === 'bot'
            }"
          >

            <div
              class="message"
              [ngClass]="{
                'user-message':
                  msg.sender === 'user',

                'bot-message':
                  msg.sender === 'bot'
              }"
            >

              <!-- ===================================================== -->
              <!-- MESSAGE TEXT -->
              <!-- ===================================================== -->

              <div class="message-text">
                {{ msg.text }}
              </div>

              <!-- ===================================================== -->
              <!-- SUGGESTIONS -->
              <!-- ===================================================== -->

              <div
                *ngIf="msg.suggestions?.length"
                class="suggestions"
              >

                <button
                  *ngFor="let suggestion of msg.suggestions"
                  (click)="selectSuggestion(suggestion)"
                >
                  {{ suggestion }}
                </button>

              </div>

              <!-- ===================================================== -->
              <!-- RELATED COURSES -->
              <!-- ===================================================== -->

              <div
                *ngIf="msg.relatedCourses?.length"
                class="related-courses"
              >

                <div class="section-title">
                  Cursos relacionados
                </div>

                <div
                  *ngFor="let course of msg.relatedCourses"
                  class="course-pill"
                >
                  🎓 {{ course }}
                </div>

              </div>

              <!-- ===================================================== -->
              <!-- NAVIGATION -->
              <!-- ===================================================== -->

              <div
                *ngIf="msg.navigation?.length"
                class="navigation-links"
              >

                <div class="section-title">
                  Acessos rápidos
                </div>

                <div
                  *ngFor="let nav of msg.navigation"
                  class="navigation-card"
                >

                  <div class="navigation-info">

                    <div class="navigation-title">
                      {{ nav.label }}
                    </div>

                    <div class="navigation-description">
                      {{ nav.description }}
                    </div>

                    <div class="navigation-route">
                      {{ nav.route }}
                    </div>

                  </div>

                  <button
                    class="navigation-button"
                    (click)="navigateTo(nav.route)"
                  >
                    Acessar
                  </button>

                </div>

              </div>

            </div>
          </div>

          <!-- ===================================================== -->
          <!-- TYPING -->
          <!-- ===================================================== -->

          <div
            *ngIf="loading"
            class="typing"
          >
            <span></span>
            <span></span>
            <span></span>
          </div>

        </div>

        <!-- ===================================================== -->
        <!-- INPUT -->
        <!-- ===================================================== -->

        <div class="chat-input">

          <input
            type="text"
            placeholder="Digite sua mensagem..."
            [(ngModel)]="userMessage"
            (keyup.enter)="sendMessage()"
          />

          <button
            (click)="sendMessage()"
          >
            Enviar
          </button>

        </div>

      </div>
    </div>

  </div>
</div>
